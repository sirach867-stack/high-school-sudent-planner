<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { padding: 30px; background-color: #f8fafc; color: #334155; }
        
        /* Modern Header Banner */
        .page-header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 24px;
            border-radius: 16px;
            color: #ffffff;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1);
        }
        .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .page-header p { font-size: 14px; opacity: 0.9; }

        .add-folder-btn {
            background-color: #ffffff;
            color: #4f46e5;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s, background-color 0.2s;
        }
        .add-folder-btn:hover { background-color: #f1f5f9; transform: scale(1.02); }

        /* Drawer Input Card */
        .input-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            display: none;
            gap: 12px;
            align-items: center;
            animation: slideDown 0.2s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-field:focus { border-color: #6366f1; }

        .save-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Folders Screen View Grid */
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .folder-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .folder-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.04);
        }
        .folder-icon { font-size: 36px; margin-bottom: 12px; color: #f59e0b; }
        .folder-title { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .folder-desc { font-size: 13px; color: #94a3b8; }

        .delete-folder-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-folder-icon:hover { color: #ef4444; }

        /* Inside Folder Note Workspace View (Hidden by default) */
        .inside-folder-view {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01);
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-nav-btn {
            background: none;
            border: none;
            color: #6366f1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-nav-btn:hover { color: #4f46e5; }

        .active-folder-header {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .note-textarea {
            width: 100%;
            height: 350px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            outline: none;
            resize: none;
            background-color: #fafafa;
        }
        .note-textarea:focus { border-color: #6366f1; background-color: #ffffff; }
    </style>
</head>
<body>

    <div id="folders-screen-wrapper">
        <div class="page-header">
            <div>
                <h1>Notes</h1>
                <p>Organize your study folders and type up your class notes inside.</p>
            </div>
            <button id="add-folder-trigger" class="add-folder-btn">＋ New Folder</button>
        </div>

        <div id="input-drawer" class="input-card">
            <input type="text" id="folder-name-input" class="input-field" placeholder="Enter Folder Name (e.g., History Notes)...">
            <button id="save-folder-btn" class="save-btn">Create Folder</button>
        </div>

        <div class="folders-grid" id="folders-container">
            </div>
    </div>

    <div id="editor-screen-wrapper" class="inside-folder-view">
        <button id="back-to-folders-btn" class="back-nav-btn">⬅ Back to Folders</button>
        <div class="active-folder-header" id="current-folder-title">Folder Name</div>
        <textarea id="note-editor" class="note-textarea" placeholder="Start typing your class notes or reminders here..."></textarea>
    </div>

    <script src="../js/notes.js"></script>
</body>
</html>
