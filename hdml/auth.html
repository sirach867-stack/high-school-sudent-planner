<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Workspace Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(99, 91, 255, 0.08);
            border: 1px solid #e2e8f0;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #635bff, #a855f7);
            border-radius: 16px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 8px 16px rgba(99, 91, 255, 0.15);
        }

        .brand-header h1 { font-size: 24px; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }
        .brand-header p { font-size: 14px; color: #64748b; margin-top: 4px; }

        .tab-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 700;
            color: #64748b;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #635bff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .input-box:focus {
            border-color: #635bff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: #635bff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(99, 91, 255, 0.15);
        }

        .submit-btn:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 91, 255, 0.25);
        }

        .alert-message {
            color: #ef4444;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-header">
            <div class="brand-logo">🎓</div>
            <h1>Student Planner</h1>
            <p>Access your school tasks and calendar workspace</p>
        </div>

        <div class="tab-switcher">
            <button class="tab-btn active" onclick="switchForm('login')">Sign In</button>
            <button class="tab-btn" onclick="switchForm('register')">Sign Up</button>
        </div>

        <form id="login-form" class="auth-form active" onsubmit="handleLoginSubmit(event)">
            <div class="input-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" class="input-box" placeholder="Your account username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="input-box" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="submit-btn">Sign In to Dashboard</button>
            <div id="login-error" class="alert-message">No account found with that username!</div>
        </form>

        <form id="register-form" class="auth-form" onsubmit="handleRegisterSubmit(event)">
            <div class="input-group">
                <label for="reg-username">Choose Username</label>
                <input type="text" id="reg-username" class="input-box" placeholder="e.g., sirach" required>
            </div>
            <div class="input-group">
                <label for="reg-school">School Name (Optional)</label>
                <input type="text" id="reg-school" class="input-box" placeholder="e.g., Horizon Science Academy">
            </div>
            <div class="input-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" class="input-box" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Create & Enter Workspace</button>
        </form>
    </div>

    <script>
        function switchForm(mode) {
            const tabs = document.querySelectorAll('.tab-btn');
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            
            document.getElementById('login-error').style.display = 'none';

            if(mode === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.classList.add('active');
                regForm.classList.remove('active');
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.classList.remove('active');
                regForm.classList.add('active');
            }
        }

        // Handles Registration and Logs the user in directly right away!
        function handleRegisterSubmit(event) {
            event.preventDefault();
            const uName = document.getElementById('reg-username').value.trim().toLowerCase();
            let schoolVal = document.getElementById('reg-school').value.trim();
            
            if(!schoolVal) {
                schoolVal = "student workspace";
            }
            
            // Save the profile info setup database keys
            localStorage.setItem(`user_${uName}_name`, uName);
            localStorage.setItem(`user_${uName}_school`, schoolVal);
            
            // Set session login data immediately 
            localStorage.setItem('portal_current_user', uName);
            
            // Direct entry into the main layout without step blocks
            window.parent.location.replace("../index.html");
        }

        function handleLoginSubmit(event) {
            event.preventDefault();
            const uName = document.getElementById('login-username').value.trim().toLowerCase();
            
            const profileExists = localStorage.getItem(`user_${uName}_name`) || uName === 'sirach';
            
            if(profileExists) {
                localStorage.setItem('portal_current_user', uName);
                window.parent.location.replace("../index.html");
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // Safeguard gateway auto bypass redirect rules
        if (localStorage.getItem('portal_current_user')) {
            window.parent.location.replace("../index.html");
        }
    </script>
</body>
</html>
