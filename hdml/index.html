<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High School Student Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const currentUser = localStorage.getItem('portal_current_user');
            if (!currentUser) {
                window.location.replace("page/auth.html");
            }
        })();
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; min-height: 100vh; display: none; overflow: hidden; }

        .sidebar {
            width: 280px; background: #635bff; color: white; padding: 35px 24px;
            display: flex; flex-direction: column; justify-content: space-between;
            height: 100vh; flex-shrink: 0; box-shadow: 4px 0 25px rgba(99, 91, 255, 0.1);
        }
        .sidebar-profile-card { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .sidebar-avatar-img { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); object-fit: cover; }
        .sidebar-profile-info h3 { font-size: 16px; font-weight: 700; color: white; }
        .sidebar-profile-info p { font-size: 11px; opacity: 0.8; color: white; }
        
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .nav-btn {
            width: 100%; text-align: left; background: transparent; border: none;
            color: white; padding: 12px 16px; border-radius: 12px; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-btn.active { background: rgba(255, 255, 255, 0.2); font-weight: 700; }

        .logout-btn { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); 
            margin-top: auto; color: white; text-align: center; justify-content: center;
        }
        .logout-btn:hover { background: #ef4444; border-color: #ef4444; }
        .main-content-window { flex: 1; height: 100vh; border: none; background: #f8fafc; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="sidebar-profile-card">
                <img id="sidebar-avatar" class="sidebar-avatar-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Avatar">
                <div class="sidebar-profile-info">
                    <h3 id="sidebar-name-display">sirach</h3>
                    <p id="sidebar-sub-display">horizon science academy</p>
                </div>
            </div>
            <ul class="nav-links">
                <li><button class="nav-btn active" onclick="switchView('page/homepage.html', this)">📊 Dashboard</button></li>
                <li><button class="nav-btn" onclick="switchView('page/homework.html', this)">📝 Homework</button></li>
                <li><button class="nav-btn" onclick="switchView('page/schedule.html', this)">⏳ Schedule</button></li>
                <li><button class="nav-btn" onclick="switchView('page/calender.html', this)">📅 Calendar</button></li>
                <li><button class="nav-btn" onclick="switchView('page/notes.html', this)">📄 Notes</button></li>
                <li><button class="nav-btn" onclick="switchView('page/settings.html', this)">⚙️ Settings</button></li>
            </ul>
        </div>
        <button class="nav-btn logout-btn" onclick="handleLogout()">Sign Out Profile</button>
    </div>

    <iframe id="content-frame" name="content-frame" class="main-content-window" src="page/homepage.html"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('portal_current_user');
            if (!currentUser) return;

            document.body.style.display = 'flex';
            const savedName = localStorage.getItem(`user_${currentUser}_name`) || currentUser;
            const savedSchool = localStorage.getItem(`user_${currentUser}_school`) || "horizon science academy high school";
            
            document.getElementById('sidebar-name-display').textContent = savedName;
            document.getElementById('sidebar-sub-display').textContent = savedSchool;
        });

        function switchView(url, buttonElement) {
            document.getElementById('content-frame').src = url;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        function handleLogout() {
            localStorage.removeItem('portal_current_user');
            window.location.replace("page/auth.html");
        }
    </script>
</body>
</html>
